[package]
name = "jewel-erp"
version = "0.1.0"
description = "Jewel-ERP — offline-first jewellery store ERP (desktop)"
authors = ["Jewel-ERP"]
edition = "2021"
rust-version = "1.77"

# The library that the desktop binary (and mobile, if ever added) shares.
[lib]
name = "jewel_erp_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
# SQLite persistence exposed to the frontend via the JS @tauri-apps/plugin-sql API.
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
# Disables the auto-generated dev-server console window on Windows release builds.
default = []
